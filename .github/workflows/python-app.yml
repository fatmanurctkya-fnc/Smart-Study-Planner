name: Smart Study Planner CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Repository kodunu al
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python sürümünü kontrol et
        run: python --version

      - name: Kodun syntax kontrolü
        run: python -m py_compile *.py

      - name: Basit CI mesajı
        run: echo "Smart Study Planner CI başarıyla çalıştı"
